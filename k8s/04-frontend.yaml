apiVersion: apps/v1
kind: Deployment
metadata:
  name: scheduler-frontend
  namespace: job-scheduler
spec:
  replicas: 2
  selector:
    matchLabels:
      app: scheduler-frontend
  template:
    metadata:
      labels:
        app: scheduler-frontend
    spec:
      containers:
        - name: frontend
          image: job-scheduler-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: scheduler-frontend
  namespace: job-scheduler
spec:
  selector:
    app: scheduler-frontend
  ports:
    - port: 80
      targetPort: 80
  type: LoadBalancer
