server:
  port: 8080

spring:
  application:
    name: job-scheduling-platform

  datasource:
    url: jdbc:h2:mem:jobsdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      retries: 0
      properties:
        max.block.ms: 5000
        request.timeout.ms: 5000
    consumer:
      auto-offset-reset: earliest
      properties:
        session.timeout.ms: 10000
        request.timeout.ms: 5000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.scheduler: INFO
    org.apache.kafka: WARN
